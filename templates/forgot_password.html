{% extends "base.html" %}

{% block content %}
<section class="metric-card auth-panel">
  <div class="metric-label">Password Recovery</div>
  <h3>Reset access</h3>
  <p class="text-secondary">This starter shows the recovery flow. Connect it to Firebase Auth or your email provider later.</p>

  {% if message %}
  <div class="alert alert-info mt-3">{{ message }}</div>
  {% endif %}

  <form method="post" class="vstack gap-3 mt-4" style="max-width: 520px;">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <input class="form-control" type="email" name="email" placeholder="Enter your email" required>
    <button class="btn btn-primary" type="submit">Send reset link</button>
  </form>
</section>
{% endblock %}
